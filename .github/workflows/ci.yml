name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WeeklyPlanner.sln

      - name: Build
        run: dotnet build WeeklyPlanner.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WeeklyPlanner.sln --configuration Release --no-build --logger "trx;LogFileName=weeklyplanner-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
